services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: rental
      POSTGRES_PASSWORD: pwd
      POSTGRES_DB: rental_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
